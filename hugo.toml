baseURL = "https://pipery.dev/"
languageCode = "en-us"
title = "Pipery - Production-grade CI/CD pipelines"
theme = ["hugo-brewm", "hugo-book"]
enableRobotsTXT = true
disablePathToLower = true

[params]
  description = "Pipery provides verified, reusable, and observable CI/CD pipelines for GitHub Actions, with structured psh logs, replayable pipery.jsonl output, and a dashboard for debugging workflow runs."
  keywords = ["Pipery", "CI/CD pipelines", "GitHub Actions CI", "GitHub Actions CD", "DevOps automation", "pipeline observability", "structured CI logs", "pipery.jsonl", "psh", "Pipery Dashboard", "continuous integration", "continuous delivery"]
  images = "/images/pipery-color.png"
  extMeta = false
  DisableFootBar = false

  primaryColor = "#6366F1"
  secondaryColor = "#7C3AED"
  accentColor = "#06B6D4"
  backgroundColor = "#0F172A"
  textColor = "#E5E7EB"

  twitter = "https://twitter.com/pipery"
  github = "https://github.com/pipery-dev"

  googleAnalytics = ""
  customCSS = ["css/custom.css"]
  BookTheme = "dark"
  BookToC = true
  BookLogo = "images/pipery-mark-dark.png"
  BookFavicon = "favicon.png"
  BookSection = "docs"
  BookSearch = true
  BookComments = false
  BookRepo = "https://github.com/pipery-dev/pipery-dev.github.io"
  BookEditLink = "https://github.com/pipery-dev/pipery-dev.github.io/edit/main/{{ .Path }}"
  BookDateFormat = "January 2, 2006"

[params.author]
  name = "Pipery"
  email = "hello@pipery.dev"

[params.favicon]
  ico = "/favicon.ico"
  png = "/favicon.png"
  apple = "/apple-touch-icon.png"

[params.logo]
  logoMark = "/images/pipery-mark-light.png"
  logoMarkDark = "/images/pipery-mark-dark.png"
  logoType = false

[params.socialCard]
  enable = true
  opengraph = false
  twitter = false
  twitterSite = "pipery"
  twitterCreator = "pipery"
  images = "/images/pipery-color.png"

[params.seo]
  siteName = "Pipery"
  title = "Pipery - Production-grade CI/CD pipelines"
  description = "Verified, reusable, and observable CI/CD pipelines for GitHub Actions, with structured psh logs, replayable pipery.jsonl output, and a dashboard for debugging workflow runs."
  image = "/images/pipery-color.png"

[params.home]
  disableSlide = true
  disableListing = true

[params.posts]
  share = false
  related = false
  noIndent = false
  justifying = false

[params.search]
  enable = false

[params.typeface]
  webSafe = false
  localHost = false
  serif = "Cormorant"
  sans = "Montserrat"

[[menu.main]]
  name = "Pipelines"
  url = "/catalog/"
  weight = 1

[[menu.main]]
  name = "Features"
  url = "/#features"
  weight = 2

[[menu.main]]
  name = "Guides"
  url = "/#guides"
  weight = 3

[[menu.main]]
  name = "Docs"
  url = "/docs/"
  weight = 4

[[menu.main]]
  name = "Get Started"
  url = "https://start.pipery.dev"
  weight = 5

[[menu.after]]
  name = "Home"
  url = "https://pipery.dev/"
  weight = 10

[[menu.after]]
  name = "Catalog"
  url = "https://pipery.dev/catalog/"
  weight = 20

[[menu.after]]
  name = "Start"
  url = "https://start.pipery.dev"
  weight = 30

[[menu.after]]
  name = "GitHub"
  url = "https://github.com/pipery-dev"
  weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 1
