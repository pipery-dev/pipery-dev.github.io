name: Release Static Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: release
      RELEASE_VERSION: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Ensure clean git working tree
        run: |
          git status
          git reset --hard
          git clean -ffdx

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build static export
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm run build

      - name: Add GitHub Pages markers
        run: |
          touch out/.nojekyll

      - name: Publish versioned static files to release branch
        run: |
          set -eu
          echo "Publishing release ${RELEASE_VERSION} to branch ${BRANCH_NAME}…"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          RELEASE_PATH="releases/${RELEASE_VERSION}"
          if [[ "$REPOSITORY_NAME" == *.github.io ]]; then
            SITE_PATH="/${RELEASE_PATH}/"
          else
            SITE_PATH="/${REPOSITORY_NAME}/${RELEASE_PATH}/"
          fi
          TEMP_DIR="$(mktemp -d)"
          echo "Using temporary directory ${TEMP_DIR} for intermediate files."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Checking out branch ${BRANCH_NAME}…"
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch ${BRANCH_NAME} already exists. Checking it out…"
            git fetch origin "$BRANCH_NAME"
            git switch --create "$BRANCH_NAME" --track "origin/$BRANCH_NAME" || git switch "$BRANCH_NAME"
          else
            echo  "Branch ${BRANCH_NAME} does not exist. Creating orphan branch…"
            git checkout -b "$BRANCH_NAME"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          echo "Publishing release to ${RELEASE_PATH}…"
          mkdir -p "$RELEASE_PATH"

          if [ -e "$RELEASE_PATH/index.html" ]; then
            echo "Release ${RELEASE_VERSION} already exists at ${RELEASE_PATH}." >&2
            exit 1
          fi

          cp -R out/. "$RELEASE_PATH"/

          cat <<EOF > "$TEMP_DIR/index.html"
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Redirecting…</title>
              <meta http-equiv="refresh" content="0; url=${SITE_PATH}" />
              <link rel="canonical" href="${SITE_PATH}" />
            </head>
            <body>
              <p><a href="${SITE_PATH}">Open latest release</a></p>
            </body>
          </html>
          EOF

          cp "$TEMP_DIR/index.html" index.html
          cp "$TEMP_DIR/index.html" 404.html
          cp out/.nojekyll .nojekyll
          echo "Committing and pushing release to branch ${BRANCH_NAME}…"
          git add --all
          git commit -m "Release static site ${RELEASE_VERSION}"
          git push origin "HEAD:${BRANCH_NAME}"
