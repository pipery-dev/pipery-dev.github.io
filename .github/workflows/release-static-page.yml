name: Release Static Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: release/${{ github.sha }}
      RELEASE_VERSION: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Ensure clean git working tree
        run: |
          git status
          git reset --hard
          git clean -ffdx

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build static export
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm run build

      - name: Add GitHub Pages markers
        run: |
          touch out/.nojekyll

      - name: Publish versioned static files to release branch
        run: |
          set -eu
          echo "Publishing release ${RELEASE_VERSION} to branch ${BRANCH_NAME}…"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Creating orphan branch ${BRANCH_NAME}…"
          git switch --orphan "$BRANCH_NAME"

          echo "Copying built artifacts to branch root…"
          cp -R out/. ./
          cp out/.nojekyll .nojekyll

          echo "Committing and pushing release to branch ${BRANCH_NAME}…"
          git add --all
          git commit -m "Release static site ${RELEASE_VERSION}"
          git push origin "HEAD:${BRANCH_NAME}"
